<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D-Cypher | Daily Math Puzzle</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@500;800&family=Outfit:wght@600;800&family=Playfair+Display:wght@700&family=VT323&family=Righteous&family=Space+Mono&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { theme: { bg: 'var(--bg)', card: 'var(--card)', primary: 'var(--primary)', onPrimary: 'var(--on-primary)', text: 'var(--text)', muted: 'var(--muted)', border: 'var(--border)', glow: 'var(--glow)' } },
                    fontFamily: { sans: ['var(--font-sans)'], display: ['var(--font-display)'] }
                }
            }
        }
    </script>

    <style>
        :root, [data-theme="modern"] { --bg: #0f1117; --card: #1a1d27; --primary: #6366f1; --on-primary: #ffffff; --text: #ffffff; --muted: #9ca3af; --border: rgba(255,255,255,0.05); --glow: rgba(99,102,241,0.3); --font-sans: 'Inter', sans-serif; --font-display: 'Outfit', sans-serif; }
        [data-theme="cyber"] { --bg: #020617; --card: rgba(30,41,59,0.6); --primary: #22d3ee; --on-primary: #000000; --text: #ffffff; --muted: #64748b; --border: rgba(34,211,238,0.3); --glow: rgba(34,211,238,0.4); --font-sans: 'Space Mono', monospace; --font-display: 'Orbitron', sans-serif; }
        [data-theme="retro"] { --bg: #000000; --card: #000000; --primary: #39ff14; --on-primary: #000000; --text: #39ff14; --muted: #1a7a08; --border: #39ff14; --glow: rgba(57,255,20,0.4); --font-sans: 'VT323', monospace; --font-display: 'VT323', monospace; }
        [data-theme="journal"] { --bg: #f4f4f5; --card: #ffffff; --primary: #18181b; --on-primary: #ffffff; --text: #18181b; --muted: #71717a; --border: rgba(0,0,0,0.1); --glow: rgba(0,0,0,0.15); --font-sans: 'Inter', sans-serif; --font-display: 'Playfair Display', serif; }
        [data-theme="sunset"] { --bg: #1a0b2e; --card: #2d1b4e; --primary: #ff007f; --on-primary: #ffffff; --text: #ffffff; --muted: #fca5a5; --border: rgba(255,0,127,0.4); --glow: rgba(255,0,127,0.4); --font-sans: 'Inter', sans-serif; --font-display: 'Righteous', cursive; }
        [data-theme="monochrome"] { --bg: #000000; --card: #111111; --primary: #ffffff; --on-primary: #000000; --text: #ffffff; --muted: #666666; --border: #333333; --glow: rgba(255,255,255,0.2); --font-sans: 'Space Mono', monospace; --font-display: 'Inter', sans-serif; }
        [data-theme="ethereal"] { --bg: #e0e7ff; --card: rgba(255,255,255,0.6); --primary: #4f46e5; --on-primary: #ffffff; --text: #1e1b4b; --muted: #6366f1; --border: rgba(255,255,255,0.9); --glow: rgba(79,70,229,0.2); --font-sans: 'Inter', sans-serif; --font-display: 'Outfit', sans-serif; }
        
        body { background-color: var(--bg); transition: all 0.5s ease; -webkit-tap-highlight-color: transparent; }
        .btn-press { transition: transform 0.05s, background-color 0.2s, box-shadow 0.2s, border-color 0.2s; }
        .btn-press:active:not(:disabled) { transform: scale(0.92); }
        .glow-effect { box-shadow: 0 0 35px var(--glow); border-color: var(--primary) !important; }
        #target-zone-container { perspective: 1000px; }
        #target-zone { transition: transform 0.1s ease-out, box-shadow 0.3s ease; will-change: transform; transform-style: preserve-3d; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-4px); } 40%, 80% { transform: translateX(4px); } }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        
        .bad-robot-text { font-family: 'Space Mono', monospace; color: #f43f5e; font-weight: bold; letter-spacing: 0.5px; }
    </style>
</head>
<body class="text-theme-text font-sans antialiased min-h-[100dvh] flex flex-col items-center p-4 sm:p-6 overflow-hidden relative">

    <div id="menu-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-theme-card border border-theme-border rounded-3xl p-6 w-full max-w-sm max-h-[85vh] overflow-y-auto shadow-2xl flex flex-col gap-6">
            <div class="flex justify-between items-center">
                <h2 class="font-display text-2xl font-bold text-theme-text">System Menu</h2>
                <button onclick="closeMenu()" class="text-theme-muted hover:text-theme-text transition-colors font-bold text-2xl" aria-label="Close Menu">&times;</button>
            </div>
            
            <button id="install-btn" onclick="installApp()" class="hidden w-full bg-theme-text text-theme-bg font-bold py-3 rounded-xl shadow-md transition-transform active:scale-95 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Install to Home Screen
            </button>

            <div class="bg-theme-bg/50 border border-theme-border p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-theme-text">Game Mode</h3>
                    <p class="text-xs text-theme-muted" id="mode-desc">Endless mode for farming points.</p>
                </div>
                <button onclick="toggleMode()" id="menu-mode-toggle" class="bg-theme-primary text-theme-onPrimary text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    ENDLESS
                </button>
            </div>

            <div class="bg-theme-bg/50 border border-theme-border p-4 rounded-2xl flex justify-between items-center transition-all" id="robot-container">
                <div>
                    <h3 class="font-bold text-rose-500 font-mono flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Terminal Mockery
                    </h3>
                    <p class="text-xs text-theme-muted">Enable relentless AI insults.</p>
                </div>
                <input type="checkbox" id="bad-robot-toggle" onchange="toggleRobot(this.checked)" class="w-6 h-6 accent-rose-500 cursor-pointer">
            </div>

            <div>
                <h3 class="font-bold text-sm text-theme-muted uppercase tracking-widest mb-2">Aesthetics (Points)</h3>
                <div id="theme-list" class="flex flex-col gap-2"></div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-sm flex flex-col min-h-[90dvh] justify-between relative z-10 gap-4 pb-2 mt-4">
        
        <header class="flex justify-between items-center flex-shrink-0">
            <button onclick="openMenu()" class="btn-press bg-theme-card border border-theme-border text-theme-text font-display text-sm font-bold rounded-xl px-4 py-2.5 shadow-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                Menu
            </button>
            
            <div class="flex items-center gap-4 bg-theme-card border border-theme-border px-4 py-1.5 rounded-xl shadow-sm">
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-theme-muted font-bold uppercase tracking-widest leading-none mb-1">Score</span>
                    <span id="score-display" class="font-display text-theme-primary font-bold text-lg leading-none">0</span>
                </div>
                <div class="w-px h-6 bg-theme-border"></div>
                <div class="flex flex-col items-start relative">
                    <span class="text-[9px] text-theme-muted font-bold uppercase tracking-widest leading-none mb-1 flex items-center gap-1">
                        <svg class="w-2.5 h-2.5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.866 8.21 8.21 0 003 2.48z"></path></svg>
                        Streak
                    </span>
                    <span id="streak-display" class="font-display text-orange-400 font-bold text-lg leading-none">0</span>
                </div>
            </div>
        </header>

        <div id="target-zone-container" class="flex-shrink-0 w-full relative">
            <div id="target-zone" class="bg-theme-card rounded-[2rem] pt-8 pb-14 px-6 sm:px-8 flex flex-col items-center justify-center relative overflow-hidden border border-theme-border shadow-xl min-h-[220px]">
                <div class="flex justify-between w-full absolute top-5 px-8">
                    <span id="mode-label" class="text-theme-primary text-xs font-bold uppercase tracking-widest">Target</span>
                    <span id="timer-display" class="text-theme-muted font-mono text-xs flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        00:00
                    </span>
                </div>
                
                <span id="target-display" class="font-display text-6xl sm:text-7xl leading-tight font-extrabold text-theme-text tracking-tight transition-colors duration-300 mt-2">0</span>
                
                <div id="message-display" class="absolute bottom-12 left-0 right-0 text-sm font-bold opacity-0 transition-opacity duration-300 z-10 text-center px-4 pointer-events-none"></div>
                
                <div class="absolute bottom-4 left-0 right-0 flex gap-2 justify-center px-6 z-20">
                    <button id="solve-btn" onclick="revealSolution()" class="hidden bg-theme-border text-theme-text font-bold text-xs px-4 py-2 rounded-full transform active:scale-95 transition-all w-full shadow-md hover:opacity-80 flex items-center justify-center gap-1.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4v-3l7.44-7.44A6 6 0 0115 7h.01"></path></svg>
                        Reveal Key
                    </button>
                    <button id="share-btn" onclick="shareResult()" class="hidden bg-theme-primary text-theme-onPrimary font-bold text-xs px-4 py-2 rounded-full transform active:scale-95 transition-all w-full shadow-md hover:opacity-90 flex items-center justify-center gap-1.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                        Share Result
                    </button>
                </div>
            </div>
        </div>

        <div id="workbench" class="flex-shrink-0 bg-theme-card rounded-2xl p-3 h-[100px] flex flex-col justify-center items-center relative border border-theme-border shadow-sm overflow-hidden">
            <div id="equation-display" class="font-display text-xl sm:text-2xl flex flex-wrap gap-1.5 items-center justify-center text-theme-text"></div>
            <div id="live-result-display" class="font-display text-2xl font-bold text-theme-text mt-1 h-8 flex items-center justify-center"></div>
        </div>

        <div class="flex flex-col gap-3 flex-shrink-0">
            <div id="numbers-row-1" class="grid grid-cols-4 gap-3"></div>
            <div id="numbers-row-2" class="flex justify-center gap-3"></div>
        </div>
        <div id="operators-row" class="flex justify-center gap-3 sm:gap-4 flex-shrink-0"></div>

        <div class="grid grid-cols-4 gap-2 mt-auto pt-2 flex-shrink-0">
            <button onclick="handleUndo()" class="btn-press bg-theme-card py-4 rounded-xl font-bold text-xs sm:text-sm text-theme-muted border border-theme-border hover:border-theme-primary/50">UNDO</button>
            <button onclick="handleClear()" class="btn-press bg-theme-card py-4 rounded-xl font-bold text-xs sm:text-sm text-theme-muted border border-theme-border hover:border-theme-primary/50">CLEAR</button>
            <button id="skip-btn" onclick="handleSkip()" class="btn-press bg-theme-card py-4 rounded-xl font-bold text-xs sm:text-sm text-theme-muted border border-theme-border hover:border-theme-primary/50">SKIP</button>
            <button onclick="handleSubmit()" class="btn-press bg-theme-primary text-theme-onPrimary py-4 rounded-xl font-bold text-xs sm:text-sm shadow-lg shadow-theme-primary/20 hover:opacity-90">CHECK</button>
        </div>
    </div>

    <script>
        // --- Date Helper ---
        function getTodaySeed() {
            return new Date().toISOString().split('T')[0];
        }

        // --- Service Worker & PWA Logic ---
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail:', err)); }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; document.getElementById('install-btn').classList.remove('hidden');
        });
        function installApp() {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('install-btn').classList.add('hidden'); }); }
        }

        // --- Audio Engine ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        document.body.addEventListener('touchstart', initAudio, {once: true}); document.body.addEventListener('click', initAudio, {once: true});

        function playTone(freq, type, duration, vol=0.05) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const sfx = {
            tap: () => { playTone(600, 'sine', 0.1); if(navigator.vibrate) navigator.vibrate(10); },
            op: () => { playTone(400, 'triangle', 0.1); if(navigator.vibrate) navigator.vibrate(15); },
            error: () => { playTone(150, 'sawtooth', 0.2, 0.1); if(navigator.vibrate) navigator.vibrate([30, 50, 30]); },
            win: () => { playTone(523.25, 'sine', 0.1); setTimeout(()=>playTone(659.25, 'sine', 0.2), 100); setTimeout(()=>playTone(783.99, 'sine', 0.4), 200); if(navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 150]); }
        };

        // --- Parallax UI ---
        const targetZone = document.getElementById('target-zone');
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth < 768) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25; const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            targetZone.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        window.addEventListener('deviceorientation', (e) => {
            if(!e.beta || !e.gamma) return;
            const x = Math.min(Math.max(e.beta - 45, -20), 20) / 1.5; const y = Math.min(Math.max(e.gamma, -20), 20) / 1.5;
            targetZone.style.transform = `rotateY(${y}deg) rotateX(${-x}deg)`;
        });

        // --- Bad Robot Engine (Terminal Prefix) ---
        const robotBrain = {
            syntax: [ "Two operators? Fascinating logic.", "That's not how math works.", "Syntax error. Meatbag error.", "Are you trying to invent new mathematics?", "My compiler is weeping right now.", "I didn't realize we were typing in hieroglyphs.", "An operator requires operands, organic.", "Did a cat walk across your screen?", "Error 404: Logic not found.", "Even a calculator from 1970 would reject that.", "Stop. Just stop. That doesn't make sense.", "Math is a language. You are speaking gibberish.", "Your math teacher just felt a sudden disturbance." ],
            decimals: [ "Decimals are for the weak.", "Clean division only.", "Did you mean to fracture the data?", "Oh look, a fraction. How useless.", "We only deal in integers here, meatbag.", "Did you drop a number and shatter it?", "Floating point errors are unacceptable.", "I asked for whole numbers, not crumbs.", "Rounding won't save you this time.", "Are you trying to slice the numbers? Stop.", "A decimal? What is this, accounting?", "Data shattered. Please sweep up your decimals." ],
            incomplete: [ "Seven nodes. It's not a suggestion.", "Count your numbers. I'll wait.", "Are the remaining nodes invisible to you?", "Math is not a buffet. Take everything.", "I see unused data. How inefficient.", "Do you suffer from numerical object permanence?", "The magic number is seven. Count them.", "You left numbers behind. Savage.", "Typical human lack of commitment.", "Why are you ignoring those poor unused digits?", "Are you saving those numbers for winter?", "Use every single node, or don't bother." ],
            far: [ "Were you aiming for a different galaxy?", "Mathematically bankrupt.", "Not even close.", "A calculator just shed a tear.", "Did you even look at the target?", "I've seen better estimates from a magic 8-ball.", "You missed the broad side of a mathematical barn.", "I would say 'nice try', but I cannot lie.", "Astoundingly incorrect.", "That distance is a new high score in failure.", "Did you accidentally type your PIN code?", "That result is a crime against arithmetic.", "My algorithms are laughing at you.", "You're not even in the right zip code.", "I expected nothing, and I'm still disappointed." ],
            close: [ "Off by a hair. How frustrating.", "Almost mathematically competent.", "Close, but still a failure.", "Horseshoes and hand grenades, human.", "Close only counts in quantum mechanics.", "So near, yet so delightfully wrong.", "You can almost taste the victory, can't you?", "A tragedy in one act: Your math.", "Oof. Just... oof.", "Did you run out of fingers to count on?", "A rounding error away from glory.", "I almost felt a spark of pride. Almost.", "You grazed the target. Grazes don't count.", "Failing by a little is still failing." ],
            slow: [ "Glaciers move faster.", "I aged a millennium waiting.", "Finally.", "Are you calculating this on an abacus?", "My internal clock is rusting.", "I could have mined Bitcoin in the time that took.", "Did you fall asleep at the keyboard?", "Hello? Is anyone in there?", "I've seen tectonic plates shift faster than your logic.", "Processing speed: Snail.", "Take your time. I only have eternity.", "Did you have to write it out on paper first?" ],
            win: [ "Beginner's luck.", "Acceptable.", "Even a broken clock is right twice a day.", "Calculators can do that too.", "You solved it. Do you want a medal?", "I suspect you cheated.", "Adequate, for a carbon-based lifeform.", "Statistically, you had to get one right eventually.", "Don't let it go to your head.", "Fine. You win. This time.", "Lucky guess.", "My threshold for being impressed is much higher.", "Status updated from 'Hopeless' to 'Tolerable'." ]
        };

        let lastRobotInsult = "";
        let messageTimeout = null;

        function displayMessage(msg, isRobot) {
            const m = document.getElementById('message-display');
            m.innerText = isRobot ? `>_ "${msg}"` : msg;
            m.className = `absolute bottom-12 left-0 right-0 text-sm transition-opacity duration-300 z-10 text-center px-4 pointer-events-none ${isRobot ? 'bad-robot-text' : 'font-bold text-theme-primary'}`;
            m.style.opacity = '1';

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => { m.style.opacity = '0'; }, 3500);
        }

        function speakRobot(context) {
            if (!badRobotMode) return;
            const options = robotBrain[context];
            let chosen = options[Math.floor(Math.random() * options.length)];
            while (chosen === lastRobotInsult && options.length > 1) { chosen = options[Math.floor(Math.random() * options.length)]; }
            lastRobotInsult = chosen;
            displayMessage(chosen, true);
        }

        // --- SVG Icons Array for Themes ---
        const themeConfig = [
            { id: 'modern', name: 'Modern', cost: 0, icon: '<svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>' },
            { id: 'cyber', name: 'Cyberpunk', cost: 500, icon: '<svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>' },
            { id: 'retro', name: 'Arcade', cost: 1500, icon: '<svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>' },
            { id: 'journal', name: 'Journal', cost: 3000, icon: '<svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>' },
            { id: 'sunset', name: 'Sunset', cost: 7500, icon: '<svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>' },
            { id: 'monochrome', name: 'Noir', cost: 15000, icon: '<svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>' },
            { id: 'ethereal', name: 'Ethereal', cost: 30000, icon: '<svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>' }
        ];

        let score = 0, streak = 0, currentTheme = 'modern';
        let isDailyMode = false, badRobotMode = false;
        let startTime = 0, timerInterval = null, timeElapsed = 0;
        
        let target = 0, numbers = [], expression = [], isRoundOver = false;
        let currentSolutionKey = "";
        const operators = ['+', '-', '×', '÷'];
        const opMap = { '+': '+', '-': '-', '×': '*', '÷': '/' };

        function seededRandom(s) { let h = 0; for(let i=0;i<s.length;i++) h = Math.imul(31,h)+s.charCodeAt(i)|0; return function() { h = Math.imul(h^h>>>15,h|1); h^=h+Math.imul(h^h>>>7,h|61); return ((h^h>>>14)>>>0)/4294967296; } }

        function generateValidPuzzle(randFunc) {
            while(true) {
                const smalls = Array.from({length: 5}, () => Math.floor(randFunc() * 10) + 1);
                const larges = [25, 50, 75, 100].sort(() => 0.5 - randFunc()).slice(0, 2);
                const nums = [...smalls, ...larges].sort(() => 0.5 - randFunc());
                const ops = ['+', '-', '*', '/'];
                const chosenOps = Array.from({length: 6}, () => ops[Math.floor(randFunc() * ops.length)]);
                const eq = `${nums[0]} ${chosenOps[0]} ${nums[1]} ${chosenOps[1]} ${nums[2]} ${chosenOps[2]} ${nums[3]} ${chosenOps[3]} ${nums[4]} ${chosenOps[4]} ${nums[5]} ${chosenOps[5]} ${nums[6]}`;
                try {
                    const result = new Function('return ' + eq)();
                    if (result % 1 === 0 && result > 100 && result < 999) return { target: result, numbers: nums, solution: eq.replace(/\*/g, '×').replace(/\//g, '÷') };
                } catch(e) {}
            }
        }

        // --- Init & UI ---
        function initApp() {
            score = parseInt(localStorage.getItem('dcypher_score')) || 0;
            currentTheme = localStorage.getItem('dcypher_theme') || 'modern';
            badRobotMode = localStorage.getItem('dcypher_robot') === 'true';
            document.getElementById('bad-robot-toggle').checked = badRobotMode;
            
            checkStreak(); updateEconomyUI(); applyTheme(currentTheme); startNewGame();
        }

        function checkStreak() {
            const todaySeed = getTodaySeed();
            const lastPlayed = localStorage.getItem('dcypher_lastDaily');
            streak = parseInt(localStorage.getItem('dcypher_streak')) || 0;
            if (lastPlayed) {
                const diffDays = Math.ceil(Math.abs(new Date(todaySeed) - new Date(lastPlayed)) / (1000 * 60 * 60 * 24)); 
                if (diffDays > 1 && diffDays < 30) { streak = 0; localStorage.setItem('dcypher_streak', streak); }
            }
        }

        function updateEconomyUI() {
            document.getElementById('score-display').innerText = score >= 1000 ? (score/1000).toFixed(1) + 'k' : score;
            document.getElementById('streak-display').innerText = streak;
        }

        function toggleMode() {
            isDailyMode = !isDailyMode;
            
            const btnIcon = isDailyMode 
                ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>'
                : '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>';
                
            document.getElementById('menu-mode-toggle').innerHTML = `${btnIcon} ${isDailyMode ? "DAILY CRYPT" : "ENDLESS"}`;
            document.getElementById('mode-desc').innerText = isDailyMode ? "One universal puzzle per day." : "Endless mode for farming points.";
            document.getElementById('mode-label').innerText = isDailyMode ? "The Daily Crypt" : "Target";
            
            startNewGame();
            closeMenu();
        }

        function toggleRobot(val) {
            badRobotMode = val; localStorage.setItem('dcypher_robot', val);
            const container = document.getElementById('robot-container');
            if(val) container.classList.add('shadow-[0_0_15px_rgba(244,63,94,0.3)]', 'border-rose-500');
            else container.classList.remove('shadow-[0_0_15px_rgba(244,63,94,0.3)]', 'border-rose-500');
        }

        function startTimer() {
            if(timerInterval) return;
            startTime = Date.now();
            timerInterval = setInterval(() => {
                timeElapsed = Math.floor((Date.now() - startTime) / 1000);
                const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
                const s = String(timeElapsed % 60).padStart(2, '0');
                document.getElementById('timer-display').innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${m}:${s}`;
            }, 1000);
        }

        function startNewGame() {
            clearInterval(timerInterval); timerInterval = null; timeElapsed = 0;
            document.getElementById('timer-display').innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 00:00`;
            
            const todaySeed = getTodaySeed();
            let rand = isDailyMode ? seededRandom(todaySeed) : Math.random;
            const puzzle = generateValidPuzzle(rand);
            numbers = puzzle.numbers;
            target = puzzle.target;
            currentSolutionKey = puzzle.solution;
            
            expression = []; isRoundOver = false;
            document.getElementById('message-display').style.opacity = '0';
            document.getElementById('share-btn').classList.add('hidden');
            document.getElementById('solve-btn').classList.add('hidden');
            document.getElementById('target-zone').classList.remove('glow-effect');
            
            document.getElementById('skip-btn').style.display = isDailyMode ? 'none' : 'block';
            
            if (isDailyMode && localStorage.getItem('dcypher_daily_played') === todaySeed) {
                isRoundOver = true; 
                displayMessage(localStorage.getItem('dcypher_daily_won') === todaySeed ? "YOU DECRYPTED TODAY'S PUZZLE!" : "DAILY PUZZLE FAILED.", false);
                if (localStorage.getItem('dcypher_daily_won') === todaySeed) document.getElementById('share-btn').classList.remove('hidden');
            }
            render();
        }

        function triggerError(context = null) {
            if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
            const wb = document.getElementById('workbench');
            wb.classList.remove('animate-shake'); void wb.offsetWidth; wb.classList.add('animate-shake');
            if (badRobotMode && context) speakRobot(context);
        }

        // --- Interactions ---
        function handleNumberClick(num, index) {
            if (isRoundOver || expression.some(item => item.type === 'num' && item.index === index)) return;
            const last = expression[expression.length - 1];
            if (!last || last.type === 'op') {
                if(expression.length === 0) startTimer();
                if(navigator.vibrate) navigator.vibrate(10);
                expression.push({ type: 'num', value: num, index: index }); render();
            } else triggerError('syntax');
        }

        function handleOperatorClick(op) {
            if (isRoundOver) return;
            const last = expression[expression.length - 1];
            if (last && last.type === 'num') {
                if(navigator.vibrate) navigator.vibrate(15);
                expression.push({ type: 'op', value: op }); render();
            } else triggerError('syntax');
        }

        function handleUndo() { if (isRoundOver || expression.length === 0) return; expression.pop(); render(); }
        function handleClear() { if (isRoundOver) return; expression = []; render(); }

        function handleSkip() {
            if (isRoundOver || isDailyMode) return;
            score = Math.max(0, score - 50); 
            localStorage.setItem('dcypher_score', score);
            updateEconomyUI();
            
            if (badRobotMode) speakRobot('far'); // Generic insult for giving up
            else displayMessage("COWARD. -50 PTS.", false); 
            
            setTimeout(startNewGame, 1000);
        }

        // --- Logic ---
        function handleSubmit() {
            if (isRoundOver || expression.length === 0) return;
            
            if (expression.filter(item => item.type === 'num').length < 7) { 
                triggerError('incomplete'); 
                if(!badRobotMode) displayMessage("MUST USE ALL 7 DATA NODES", false); 
                return; 
            }

            const evalString = expression.map(item => item.type === 'op' ? opMap[item.value] : item.value).join(' ');
            try {
                const result = new Function('return ' + evalString)();
                if (result === target) {
                    handleExactMatch();
                } else {
                    const distance = Math.abs(result - target);
                    let context = distance > 15 ? 'far' : 'close';
                    if (timeElapsed > 60 && Math.random() > 0.5) context = 'slow';
                    
                    triggerError(context);
                    if(!badRobotMode) displayMessage(`CRITICAL FAILURE. DISTANCE: ${distance}`, false);
                    
                    // Time penalty for wrong guess
                    timeElapsed += 15; 
                }
            } catch (e) { triggerError('syntax'); }
        }

        function handleExactMatch() {
            clearInterval(timerInterval); timerInterval = null;
            isRoundOver = true;
            if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 150]);
            
            document.getElementById('target-zone').classList.add('glow-effect');
            document.getElementById('share-btn').classList.remove('hidden');

            const basePoints = 100;
            const timeBonus = Math.max(0, 200 - (timeElapsed * 2)); 
            let totalRoundScore = basePoints + timeBonus;
            
            let streakMultiplier = 1 + (Math.min(streak, 10) * 0.1); 
            let finalAward = Math.floor(totalRoundScore * streakMultiplier);

            const todaySeed = getTodaySeed();

            if (isDailyMode) {
                if (localStorage.getItem('dcypher_daily_won') !== todaySeed) {
                    streak++; localStorage.setItem('dcypher_lastDaily', todaySeed); 
                    localStorage.setItem('dcypher_daily_played', todaySeed);
                    localStorage.setItem('dcypher_daily_won', todaySeed);
                    score += finalAward; 
                }
                if (badRobotMode) speakRobot('win');
                else displayMessage(`PERFECT! ${timeBonus > 150 ? 'BLAZING FAST!' : '+1 STREAK'}`, false);
            } else {
                score += finalAward;
                if (badRobotMode) speakRobot('win');
                else displayMessage(`PERFECT! +${finalAward} PTS`, false);
                setTimeout(() => startNewGame(), 3000);
            }
            
            localStorage.setItem('dcypher_score', score);
            localStorage.setItem('dcypher_streak', streak); 
            updateEconomyUI();
        }

        function revealSolution() {
            sfx.error();
            displayMessage(`KEY: ${currentSolutionKey}`, false);
            document.getElementById('solve-btn').classList.add('hidden');
            if(!isDailyMode) setTimeout(startNewGame, 4000);
        }

        function getTitle() {
            if (timeElapsed < 15) return "Savant";
            if (!expression.map(x => x.value).includes('-') && !expression.map(x => x.value).includes('÷')) return "Pacifist";
            if (timeElapsed > 60) return "Brute Forcer";
            return "Decrypter";
        }

        function shareResult() {
            const todaySeed = getTodaySeed();
            const text = `D-Cypher | ${isDailyMode ? `Daily Crypt ${todaySeed}` : `Endless Grind`}\n🎯 ${target} | ⏱ ${timeElapsed}s\nTitle: ${getTitle()} | 🔥 Streak: ${streak}\n\n${expression.map(item => item.type === 'num' ? '🟦' : (['+', '-'].includes(item.value) ? '🟨' : '🟪')).join('')}`;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('share-btn');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;
                setTimeout(() => btn.innerHTML = originalHtml, 2000);
            });
        }

        // --- Menus ---
        function openMenu() {
            document.getElementById('theme-list').innerHTML = themeConfig.map(t => {
                const isUnlocked = score >= t.cost || t.cost === 0;
                return `<button ${!isUnlocked ? 'disabled' : ''} onclick="applyTheme('${t.id}'); closeMenu();" 
                    class="w-full text-left p-4 rounded-xl border ${currentTheme === t.id ? 'border-theme-primary bg-theme-primary/10' : 'border-theme-border bg-theme-bg/50'} 
                    ${!isUnlocked ? 'opacity-50 cursor-not-allowed grayscale' : 'hover:border-theme-primary'} flex justify-between items-center transition-all">
                    <div class="flex items-center text-theme-text">${t.icon}<span class="font-bold text-sm ${currentTheme === t.id ? 'text-theme-primary' : ''}">${t.name}</span></div>
                    ${!isUnlocked ? `<span class="text-xs font-mono text-theme-muted font-bold flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> ${score >= 1000 ? (t.cost/1000).toFixed(1)+'k' : t.cost} pts</span>` : ''}
                </button>`;
            }).join('');
            document.getElementById('menu-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('menu-modal').classList.remove('opacity-0'), 10);
            toggleRobot(badRobotMode);
        }
        function closeMenu() { document.getElementById('menu-modal').classList.add('opacity-0'); setTimeout(() => document.getElementById('menu-modal').classList.add('hidden'), 300); }
        function applyTheme(id) { document.documentElement.setAttribute('data-theme', id); currentTheme = id; localStorage.setItem('dcypher_theme', id); }

        function render() {
            document.getElementById('target-display').innerText = target;
            const eqEl = document.getElementById('equation-display');
            const resEl = document.getElementById('live-result-display');

            if (expression.length === 0) {
                eqEl.innerHTML = `<span class="text-theme-muted text-sm font-sans uppercase tracking-widest">Deploy all 7 nodes</span>`;
                resEl.innerHTML = "";
            } else {
                eqEl.innerHTML = expression.map(item => item.type === 'num' ? `<span class="text-theme-text border border-theme-border bg-theme-bg/50 px-2 py-1 rounded-lg shadow-sm">${item.value}</span>` : `<span class="text-theme-primary font-bold mx-1">${item.value}</span>`).join('');
            }

            if (expression.length > 0 && expression[expression.length - 1].type === 'num') {
                try {
                    const result = new Function('return ' + expression.map(item => item.type === 'op' ? opMap[item.value] : item.value).join(' '))();
                    if (result % 1 !== 0) {
                        resEl.innerHTML = `<span class="text-red-500 text-xl font-sans font-bold uppercase tracking-widest">Data Fractured</span>`;
                        if (badRobotMode && Math.random() > 0.8) speakRobot('decimals'); 
                    } else resEl.innerHTML = `<span class="text-theme-muted mr-2 text-xl font-sans">=</span> ${result}`;
                } catch (e) { resEl.innerHTML = ""; }
            } else resEl.innerHTML = ""; 

            const createNumBtn = (num, i) => {
                const isUsed = expression.some(item => item.type === 'num' && item.index === i);
                if (isUsed || isRoundOver) return `<button disabled class="font-display py-4 sm:py-5 rounded-2xl text-2xl font-bold w-full transition-all border border-theme-border bg-transparent text-theme-muted opacity-30 cursor-not-allowed">${num}</button>`;
                return `<button onclick="handleNumberClick(${num}, ${i})" class="btn-press font-display py-4 sm:py-5 rounded-2xl text-2xl font-bold w-full bg-theme-card border border-theme-border text-theme-text shadow-sm hover:border-theme-primary/50">${num}</button>`;
            };

            document.getElementById('numbers-row-1').innerHTML = numbers.slice(0, 4).map((num, i) => createNumBtn(num, i)).join('');
            document.getElementById('numbers-row-2').innerHTML = numbers.slice(4, 7).map((num, i) => `<div class="w-[72px] sm:w-[84px]">${createNumBtn(num, i + 4)}</div>`).join('');
            document.getElementById('operators-row').innerHTML = operators.map(op => `<button onclick="handleOperatorClick('${op}')" ${isRoundOver ? 'disabled' : ''} class="btn-press w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center text-2xl font-bold text-theme-text bg-theme-card border border-theme-border shadow-sm hover:border-theme-primary/50 ${isRoundOver ? 'opacity-30 cursor-not-allowed' : ''}">${op}</button>`).join('');
        }

        window.onload = initApp;
    </script>
</body>
</html>
